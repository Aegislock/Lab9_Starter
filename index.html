<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script src="https://cdn.trackjs.com/agent/v3/latest/t.js"></script>
  <script>
    window.TrackJS && TrackJS.install({
      token: "c224f8e2b9f0455f941feef867950631"
      // for more configuration options, see https://docs.trackjs.com
    });
  </script>

  <script>
    let form = document.querySelector('form');
    let output = document.querySelector('output');
    let operatorSelect = document.querySelector('#operator');
    const TIMER_LABEL = 'demoTimer';
    let groupOpen = false;

    class CalculationError extends Error {
      constructor(message) {
        super(message);
        this.name = 'CalculationError';
      }
    }

    class ValidationError extends CalculationError {
      constructor(message) {
        super(message);
        this.name = 'ValidationError';
      }
    }

    class DivisionByZeroError extends CalculationError {
      constructor(message) {
        super(message);
        this.name = 'DivisionByZeroError';
      }
    }

    function parseNumber(value, fieldName) {
      if (typeof value !== 'string' || value.trim() === '') {
        throw new ValidationError(`${fieldName} is required.`);
      }
      let number = Number(value);
      if (Number.isNaN(number)) {
        throw new ValidationError(`${fieldName} must be a valid number.`);
      }
      return number;
    }

    function calculateResult(firstValue, secondValue, operator) {
      if (operator === '/' && secondValue === 0) {
        throw new DivisionByZeroError('Division by zero is not allowed.');
      }
      return eval(`${firstValue} ${operator} ${secondValue}`);
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = operatorSelect.value;

      try {
        let firstValue = parseNumber(firstNum, 'First number');
        let secondValue = parseNumber(secondNum, 'Second number');
        let result = calculateResult(firstValue, secondValue, operator);
        output.innerHTML = result;
        console.log('Calculation success:', {
          firstValue,
          operator,
          secondValue,
          result
        });
      } catch (error) {
        if (error instanceof CalculationError) {
          output.innerHTML = error.message;
        } else {
          output.innerHTML = 'Unexpected calculation error.';
        }
        console.error(error);
      } finally {
        console.log('Calculation attempt completed.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));
    const demoObject = {
      student: 'Ava',
      lab: 9,
      completed: true,
      scores: {
        homework: 18,
        project: 24,
        quiz: 8
      },
      extraCredits: [5, 2]
    };

    const demoRows = [
      { name: 'Ava', grade: 92, status: 'passing' },
      { name: 'Josh', grade: 75, status: 'passing' },
      { name: 'Mia', grade: 61, status: 'at risk' }
    ];

    function getCurrentInputs() {
      return {
        first: document.querySelector('#first-num').value,
        operator: operatorSelect.value,
        second: document.querySelector('#second-num').value
      };
    }

    errorBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.textContent.trim();
        switch (action) {
          case 'Console Log':
            console.log('Console Log Demo:', demoObject, getCurrentInputs());
            break;
          case 'Console Error':
            console.error('Console Error Demo: sample error details', getCurrentInputs());
            break;
          case 'Console Count':
            console.count('Console Count Demo');
            break;
          case 'Console Warn':
            console.warn('Console Warn Demo: check the input values', getCurrentInputs());
            break;
          case 'Console Assert':
            console.assert(
              document.querySelector('#first-num').value !== '',
              'Assert failed: First number should not be empty.'
            );
            break;
          case 'Console Clear':
            console.clear();
            break;
          case 'Console Dir':
            console.dir(document.querySelector('form'));
            break;
          case 'Console dirxml':
            console.dirxml(document.querySelector('main'));
            break;
          case 'Console Group Start':
            if (!groupOpen) {
              console.group('Grouped Demo Output');
              console.log('Group start: calculation data', demoObject);
              console.table(demoRows);
              groupOpen = true;
            } else {
              console.warn('A console group is already open.');
            }
            break;
          case 'Console Group End':
            if (groupOpen) {
              console.groupEnd();
              groupOpen = false;
            } else {
              console.warn('No console group is open to end.');
            }
            break;
          case 'Console Table':
            console.table(demoRows);
            break;
          case 'Start Timer':
            console.time(TIMER_LABEL);
            console.log('Timer started.');
            break;
          case 'End Timer':
            console.timeEnd(TIMER_LABEL);
            break;
          case 'Console Trace':
            function stepOne() {
              stepTwo();
            }
            function stepTwo() {
              console.trace('Console Trace Demo: stack trace');
            }
            stepOne();
            break;
          case 'Trigger a Global Error':
            try {
              let missingNode = document.querySelector('#missing-node');
              if (!missingNode) {
                throw new ReferenceError('Required DOM node #missing-node is not present.');
              }
              missingNode.textContent = 'This will throw';
            } catch (error) {
              console.error('Caught global error from button demo:', error.message);
            }
            break;
        }
      });
    });
  </script>
</body>

</html>
